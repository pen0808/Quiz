<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ultimate Quiz Hub</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f6f8;
        color: #333;
      }

      header {
        background: #111;
        color: white;
        text-align: center;
        padding: 20px;
      }

      main {
        max-width: 1000px;
        margin: auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }

      /* CATEGORY GRID */

      .categories {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
      }

      .category {
        background: #eee;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        font-weight: bold;
      }

      .category:hover {
        background: #ddd;
      }

      /* QUIZ HEADER */

      .quiz-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-weight: bold;
      }

      .timer {
        color: #e74c3c;
      }

      /* PROGRESS BAR */

      .progress-bar {
        height: 10px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 15px;
      }

      .progress {
        height: 100%;
        width: 0%;
        background: #27ae60;
      }

      /* OPTIONS */

      .options button {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 12px;
        border: none;
        background: #eee;
        border-radius: 6px;
        cursor: pointer;
      }

      .correct {
        background: #2ecc71 !important;
        color: white;
      }

      .wrong {
        background: #e74c3c !important;
        color: white;
      }

      .next-btn {
        margin-top: 10px;
        padding: 12px 18px;
        background: #111;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      /* Flag*/
      .qflag {
        display: flex;
        justify-content: space-between;
      }

      /* LEADERBOARD */

      .leaderboard ul {
        list-style: none;
      }

      .leaderboard li {
        padding: 6px 0;
        border-bottom: 1px solid #eee;
      }

      @media (max-width: 600px) {
        .categories {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Ultimate Quiz Hub</h1>
      <p>Choose a category and challenge your knowledge</p>
    </header>

    <main>
      <section id="categorySection" class="card">
        <h2>Quiz Categories</h2>

        <div class="categories">
          <div class="category" onclick="startCategory('general')">
            General Knowledge
          </div>
          <div class="category" onclick="startCategory('animals')">Animals</div>
          <div class="category" onclick="startCategory('flags')">
            Country Flags
          </div>
          <div class="category" onclick="startCategory('science')">Science</div>
          <div class="category" onclick="startCategory('space')">Space</div>
          <div class="category" onclick="startCategory('technology')">
            Technology
          </div>
          <div class="category" onclick="startCategory('sports')">Sports</div>
          <div class="category" onclick="startCategory('history')">History</div>
          <div class="category" onclick="startCategory('geography')">
            Geography
          </div>
          <div class="category" onclick="startCategory('movies')">Movies</div>
        </div>
      </section>

      <section id="quizSection" class="card" style="display: none">
        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>

        <div class="quiz-header">
          <span id="questionNumber"></span>
          <span class="timer">Time: <span id="timer">15</span>s</span>
        </div>
        <div class="qflag">
          <h2 id="question"></h2>
          <div class="img">
            <img
              id="flagImage"
              src=""
              alt="country flag"
              style="display: none; width: 120px"
            />
          </div>
        </div>

        <div id="options" class="options"></div>

        <button class="next-btn" onclick="nextQuestion()">Next</button>
      </section>

      <section id="scoreSection" class="card" style="display: none">
        <h2 id="scoreText"></h2>

        <button onclick="restartQuiz()">Play Again</button>
      </section>

      <section class="card leaderboard">
        <h2>Leaderboard</h2>
        <ul id="leaderboardList"></ul>
      </section>
    </main>

          },

      /* STATE */

      let currentQuiz = [];
      let category = null;
      let currentQuestion = 0;
      let score = 0;
      let timer;
      let timeLeft = 15;

      /* START */

      function startCategory(cat) {
        category = cat;
        currentQuiz = [...quizzes[cat]].sort(() => Math.random() - 0.5);

        document.getElementById("categorySection").style.display = "none";
        document.getElementById("quizSection").style.display = "block";

        loadQuestion();
      }

      /* LOAD QUESTION */

      function loadQuestion() {
        clearInterval(timer);

        timeLeft = 15;
        document.getElementById("timer").textContent = timeLeft;

        timer = setInterval(() => {
          timeLeft--;
          document.getElementById("timer").textContent = timeLeft;

          if (timeLeft === 0) {
            clearInterval(timer);
            nextQuestion();
          }
        }, 1000);

        let q = currentQuiz[currentQuestion];

        let flagImage = document.getElementById("flagImage");

        if (q.image) {
          flagImage.src = q.image;
          flagImage.style.display = "block";
        } else {
          flagImage.style.display = "none";
        }

        document.getElementById("question").textContent = q.question;

        document.getElementById("questionNumber").textContent =
          `Question ${currentQuestion + 1}/${currentQuiz.length}`;

        document.getElementById("progress").style.width =
          (currentQuestion / currentQuiz.length) * 100 + "%";

        let html = "";

        q.options.forEach((option) => {
          html += `<button onclick="selectAnswer(this,'${option}')">${option}</button>`;
        });

        document.getElementById("options").innerHTML = html;
      }

      /* ANSWER */

      function selectAnswer(btn, option) {
        clearInterval(timer);

        let correct = currentQuiz[currentQuestion].answer;

        let buttons = document.querySelectorAll(".options button");

        buttons.forEach((b) => (b.disabled = true));

        if (option === correct) {
          btn.classList.add("correct");
          score++;
        } else {
          btn.classList.add("wrong");

          buttons.forEach((b) => {
            if (b.textContent === correct) {
              b.classList.add("correct");
            }
          });
        }
      }

      /* NEXT */

      function nextQuestion() {
        currentQuestion++;

        if (currentQuestion < currentQuiz.length) {
          loadQuestion();
        } else {
          finishQuiz();
        }
      }

      /* FINISH */

      function finishQuiz() {
        document.getElementById("quizSection").style.display = "none";
        document.getElementById("scoreSection").style.display = "block";

        document.getElementById("scoreText").innerHTML =
          `Your Score: ${score}/${currentQuiz.length}`;

        // PLAY SOUND if they got at least 7 out of 10
        if (score >= currentQuiz.length * 0.7) {
          winSound.play();
        }

        saveLeaderboard(score);
      }

      /* LEADERBOARD */

      function saveLeaderboard(score) {
        let board = JSON.parse(localStorage.getItem("leaderboard")) || [];

        board.push(score);

        board.sort((a, b) => b - a);

        board = board.slice(0, 5);

        localStorage.setItem("leaderboard", JSON.stringify(board));

        loadLeaderboard();
      }

      /* Audio */
      const winSound = new Audio(
        "https://actions.google.com/sounds/v1/animations/standard_game_next_level.ogg",
      );

      function loadLeaderboard() {
        let board = JSON.parse(localStorage.getItem("leaderboard")) || [];

        let html = "";

        board.forEach((s, i) => {
          html += `<li>#${i + 1} — ${s} pts</li>`;
        });

        document.getElementById("leaderboardList").innerHTML = html;
      }

      loadLeaderboard();

      function restartQuiz() {
        location.reload();
      }

</html>
